<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | Intro component with sign up form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/normalize.css">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <!--CONTENEDOR -->
  <div class="container">
    <div class="container-info">
      <h2 class="title">Learn to code by watching others</h2>
      <p class="info">See how experienced developers solve problems in real-time. Watching scripted tutorials is great, 
        but understanding how developers think is invaluable.</p>
    </div>
    <!-- FORMULARIO -->
    <div class="container-form">
      <!-- HEADER FORMULARIO -->
      <div class="header__form">
        <p class="info__form"><span>Try it free 7 days</span> then $20/mo. thereafter</p>
      </div>
      <!-- FORM -->
        <form action="#" class="formulario">
          <!-- NOMBRE -->
          <div class="form__name">
            <input type="text" class="name inputs" placeholder="First Name">
          </div>
          <!-- APELLIDO -->
          <div class="form__phone">
            <input type="text" class="phone inputs" placeholder="Last Name">
          </div>
          <!-- CORREO -->
          <div class="form__email">
            <input type="email" class="email inputs" placeholder="Email Address">
          </div>
          <!-- CONTRASEÑA -->
          <div class="form__password">
            <input type="password" class="password inputs" placeholder="Password">
          </div>
          <!-- BOTÓN -->
          <div class="form__btn">
            <button type="submit" class="btn inputs">Claim your free trial</button>
          </div>
          <p class="terminos">By clicking the button, you are agreeing to our <span>Terms and Services</span></p>
        </form>
    </div>
  </div>

  <script src="./js/app.js"></script>
</body>
</html>
